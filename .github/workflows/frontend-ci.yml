name: frontend-ci

on:
  push:
    branches:
      - main
    tags:
      - "frontend-v*"
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: DockerHub login
        if: startsWith(github.ref, 'refs/tags/frontend-v')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/frontend-v') }}
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cicd-app-frontend:${{ github.ref_name }}
      
      - name: Update GitOps frontend image tag
        if: startsWith(github.ref, 'refs/tags/frontend-v')
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/distefano119ua/cicd-app-gitops.git gitops

          cd gitops

          sed -i "s/tag: frontend-v.*/tag: ${{ github.ref_name }}/" charts/frontend/values.yaml
          sed -i "s/appVersion: .*/appVersion: \"${{ github.ref_name }}\"/" charts/frontend/Chart.yaml

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add charts/frontend/values.yaml charts/frontend/Chart.yaml
          git commit -m "update frontend image to ${{ github.ref_name }}"
          git push