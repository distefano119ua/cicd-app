name: backend-ci-cars

on:
  push:
    paths:
      - "backend/cars-app/**"
      - ".github/workflows/backend-ci-cars.yml"
  pull_request:
    paths:
      - "backend/cars-app/**"
      - ".github/workflows/backend-ci-cars.yml"

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/cars-app

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "backend/cars-app/pyproject.toml"
    
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.24"
    
      - name: Run ruff
        run: uv run ruff check src tests

      - name: Run pytest
        run: uv run pytest
    
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: DockerHub login
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build cars backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/cars-app
          file: ./backend/cars-app/Dockerfile
          push: ${{ github.event_name == 'push' }}
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cicd-app-backend-cars:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cicd-app-backend-cars:dev
